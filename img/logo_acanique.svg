<svg width="300" height="50" viewBox="0 0 300 50" xmlns="http://www.w3.org/2000/svg">
  <g opacity="0.8">
    <!-- Logo Icon -->
    <g transform="scale(0.5)">
        <defs>
            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#dcdcdc;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#b0b0b0;stop-opacity:1" />
            </linearGradient>
        </defs>
        <path d="M 10 10 L 50 2 L 90 10 L 90 50 C 90 80, 50 100, 50 100 C 50 100, 10 80, 10 50 Z" fill="url(#grad1)" opacity="0.7"/>
        <path d="M 40 75 L 60 25 L 70 35" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
        <path d="M 65,30 A 25 25 0 0 0 40 45" fill="none" stroke="#fff" stroke-width="6" opacity="0.9"/>
    </g>

    <!-- Text part -->
    <g transform="translate(60, -5)">
        <text 
          x="0" 
          y="22" 
          font-family="Century Gothic, Arial, sans-serif"
          font-size="16px"
          fill="#ffffffff"
          letter-spacing="3"
          font-weight="900"
          text-transform="uppercase">
          ACANIQUE
        </text>
        <text 
          id="subtitle"
          x="0" 
          y="42" 
          font-family="Century Gothic, Arial, sans-serif"
          font-size="13.3px"
          fill="#ffffffff"
          font-style="italic"
          font-variant="small-caps"
          font-weight="bold">
          Académie Numérique
        </text>
        <line x1="0" y1="44" x2="130" y2="44" stroke="#525252" stroke-width="1"/>
    </g>
  </g>
</svg>
